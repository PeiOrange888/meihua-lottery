name: Settle lottery records

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Settle pending lottery records
        run: node scripts/settle-lottery.mjs
