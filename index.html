<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅花易数 · 彩票预测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a0a0a;
            --bg-secondary: #2d1515;
            --accent-red: #8b0000;
            --accent-gold: #d4af37;
            --text-primary: #f5f5dc;
            --text-secondary: #c9b896;
        }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
        }
        
        .chinese-border {
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        
        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .ball-red {
            background: linear-gradient(145deg, #ff4444 0%, #cc0000 50%, #990000 100%);
            color: white;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 
                        inset 3px 3px 6px rgba(255,255,255,0.2),
                        0 4px 8px rgba(0,0,0,0.3);
        }
        
        .ball-blue {
            background: linear-gradient(145deg, #4a90d9 0%, #1e5aa8 50%, #0d3a7a 100%);
            color: white;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 
                        inset 3px 3px 6px rgba(255,255,255,0.2),
                        0 4px 8px rgba(0,0,0,0.3);
        }
        
        .ball-purple {
            background: linear-gradient(145deg, #9b59b6 0%, #6c3483 50%, #4a235a 100%);
            color: white;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 
                        inset 3px 3px 6px rgba(255,255,255,0.2),
                        0 4px 8px rgba(0,0,0,0.3);
        }
        
        .btn-qigua {
            background: linear-gradient(145deg, var(--accent-red) 0%, #6b0000 100%);
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .btn-qigua:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }
        
        .btn-qigua:active {
            transform: translateY(0);
        }
        
        .gua-card {
            background: rgba(45, 21, 21, 0.9);
            border: 1px solid var(--accent-gold);
            padding: 1.5rem;
        }
        
        .section-title {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .detail-section {
            background: rgba(26, 10, 10, 0.8);
            border-left: 3px solid var(--accent-gold);
            padding: 1rem;
            margin-top: 1rem;
        }
        
        .qiyun-card {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
        }
        
        .qiyun-daji {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
            border: 1px solid #ffd700;
            color: #ffd700;
        }
        
        .qiyun-ji {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.2) 0%, rgba(0, 255, 0, 0.1) 100%);
            border: 1px solid #00ff00;
            color: #00ff00;
        }
        
        .qiyun-ping {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid #c0c0c0;
            color: #c0c0c0;
        }
        
        .qiyun-xiaoxiong {
            background: linear-gradient(135deg, rgba(255, 165, 0, 0.2) 0%, rgba(255, 165, 0, 0.1) 100%);
            border: 1px solid #ffa500;
            color: #ffa500;
        }
        
        .qiyun-daxiong {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2) 0%, rgba(255, 0, 0, 0.1) 100%);
            border: 1px solid #ff0000;
            color: #ff0000;
        }
        
        .qiyun-score {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .qiyun-advice {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        .prediction-container {
            max-height: 300px;
            overflow: hidden;
            position: relative;
        }

        .prediction-scroll {
            animation: scrollUp 45s linear infinite;
            /* 让滚动更平滑，避免卡顿 */
            will-change: transform;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        @keyframes scrollUp {
            0% { 
                transform: translateY(0); 
            }
            100% { 
                transform: translateY(-50%); 
            }
        }

        /* 鼠标悬停时暂停滚动，方便查看 */
        .prediction-container:hover .prediction-scroll {
            animation-play-state: paused;
        }

        .prediction-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .prize-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .prize-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .prize-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .prize-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
        .prize-4 { background: linear-gradient(135deg, #228b22, #006400); color: #fff; }
        .prize-5 { background: linear-gradient(135deg, #4169e1, #1e90ff); color: #fff; }
        .prize-6 { background: linear-gradient(135deg, #696969, #808080); color: #fff; }
        .prize-7 { background: linear-gradient(135deg, #708090, #778899); color: #fff; }
        .prize-8 { background: linear-gradient(135deg, #778899, #a9a9a9); color: #fff; }
        .prize-none { background: transparent; color: #888; font-weight: normal; }

        .matched-number {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
        }

        .period-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .refresh-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(212, 175, 55, 0.3);
        }
        
        @media (max-width: 768px) {
            .ball {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            
            .prediction-container {
                max-height: 250px;
            }
        }
    </style>
</head>
<body class="text-[var(--text-primary)]">

            <p id="timeDisplay" class="mt-4 text-[var(--text-secondary)] text-sm"></p>
        </section>

        <!-- 结果展示区 -->

                        <div id="detailShuangse" class="hidden mt-3 text-xs text-[var(--text-secondary)]"></div>
                    </div>
                </div>

                <!-- 大乐透 -->
                <div class="gua-card chinese-border rounded-lg">
                    <h2 class="section-title text-2xl font-bold">体彩大乐透</h2>
                    
                    <div class="mb-6">

                        <div id="frontBalls" class="flex flex-wrap gap-2 justify-center"></div>
                    </div>
                    
                    <div class="mb-6">
                        <p class="text-sm mb-2 text-[var(--text-secondary)]">蓝球区</p>
                        <div id="backBalls" class="flex gap-2 justify-center"></div>
                    </div>
                    
                    <div class="detail-section">
                        <div id="guaInfoDale" class="text-sm"></div>
                        <button onclick="toggleDetail('dale')" class="text-[var(--accent-gold)] text-sm mt-2 hover:underline">

                        </button>
                        <div id="detailDale" class="hidden mt-3 text-xs text-[var(--text-secondary)]"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 预测记录展示区 -->
        <section id="predictionSection" class="mt-12">
            <!-- 双色球预测记录 -->
            <div class="gua-card chinese-border rounded-lg mb-8">

                        <div class="text-center text-[var(--text-secondary)] py-4">暂无预测记录</div>
                    </div>
                </div>
            </div>

            <!-- 大乐透预测记录 -->

         * 卦数归藏
         * "物不可以终尽，故归余于太阴"
         * 卦数不可终尽，归藏于八卦循环之理
         */
        function guiCang(n, max) {
            // 确保输入是整数，避免浮点数精度问题
            const num = Math.round(n);
            let r = num % max;
            return r === 0 ? max : r;
        }

        /**
         * 同池配数（卦变跳跃法）
         * 采用先天八卦数作为跳跃步长，动爻奇偶决定方向
         * 体现"卦变往来"的易理
         */
        function tongChiPeiShu(candidates, maxVal, dongYao) {
            let result = [];
            
            for (let val of candidates) {
                let v = val;
                let attempts = 0;
                const maxAttempts = maxVal;
                
                while (result.includes(v) && attempts < maxAttempts) {
                    // 使用较大的随机步长（5-15），避免小步长导致连号
                    const step = Math.floor(Math.random() * 11) + 5;
                    // 完全随机方向
                    const direction = Math.random() > 0.5 ? 1 : -1;
                    v += direction * step;
                    
                    // 循环边界
                    while (v > maxVal) v -= maxVal;
                    while (v < 1) v += maxVal;
                    
                    attempts++;
                }
                
                result.push(v);
            }
            
            // 连号检测与交换
            for (let i = 1; i < result.length; i++) {
                if (Math.abs(result[i] - result[i-1]) <= 2) {
                    // 寻找一个距离较远的数字交换
                    for (let j = 0; j < result.length; j++) {
                        if (j !== i && Math.abs(result[j] - result[i-1]) > 3 && Math.abs(result[j] - result[i]) > 3) {
                            [result[i], result[j]] = [result[j], result[i]];
                            break;
                        }
                    }
                }
            }
            
            return result.sort((a, b) => a - b);
        }

        /**
         * 体用变数（完整版本）
         * 根据体用五行生克关系计算数值
         */
        function tiYongBianShu(ti, yong, relation, base, max) {
            // 五行生克系数
            const coeff = {
                '体生用': 0.7,
                '体克用': 1.3,
                '用生体': 1.1,
                '用克体': 0.9,
                '比和': 1.0
            };
            
            let result;
            const c = coeff[relation] || 1.0;
            
            if (relation === '比和') {
                result = Math.round((ti * yong + base) * c);
            } else if (relation === '体生用' || relation === '用生体') {
                result = Math.round((ti + yong + base) * c);
            } else {
                result = Math.round((Math.abs(ti - yong) + base) * c);
            }
            
            return guiCang(result, max);
        }

        /**
         * 五行生克系数获取
         */
        function getWuXingCoeff(relation) {
            const coeff = {
                '体生用': 0.7,
                '体克用': 1.3,
                '用生体': 1.1,
                '用克体': 0.9,
                '比和': 1.0
            };
            return coeff[relation] || 1.0;
        }

        /**
         * 获取体用关系描述
         */
        function getTiYongRelation(ti_num, yong_num) {
            const ti_wx = WUXING[ti_num];
            const yong_wx = WUXING[yong_num];
            
            if (SHENG[ti_wx] === yong_wx) {
                return { type: '体生用', desc: `体${ti_wx}生用${yong_wx}` };
            }
            if (KE[ti_wx] === yong_wx) {
                return { type: '体克用', desc: `体${ti_wx}克用${yong_wx}` };
            }
            if (SHENG[yong_wx] === ti_wx) {
                return { type: '用生体', desc: `体${ti_wx}被用${yong_wx}生` };
            }
            if (KE[yong_wx] === ti_wx) {
                return { type: '用克体', desc: `体${ti_wx}被用${yong_wx}克` };
            }
            return { type: '比和', desc: `体${ti_wx}比用${yong_wx}` };
        }

        /**
         * 三爻转先天数
         */
        function triToNumber(yao) {
            return TRI_TO_NUM[yao.join('')] || 1;
        }

        /**
         * 六爻转三爻
         */
        function liuYaoToSanYao(yao, start, end) {
            return yao.slice(start, end);
        }

        // ============================================
        // 起卦引擎
        // ============================================
// 起卦引擎
        function calculateGua() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const second = now.getSeconds();

            // 显示时间
            document.getElementById('timeDisplay').textContent = 
                `${year}年${month}月${day}日 ${hour}时${minute}分${second}秒`;

            // 第一步：计算上卦、下卦、动爻、时辰
            const sum1 = year + month + day;
            const sum2 = year + month + day + hour + minute + second;
            
            const shangGua = guiCang(sum1, 8);
            const xiaGua = guiCang(sum2, 8);
            const dongYao = guiCang(sum2, 6);
            const diZhi = guiCang((hour * 3600 + minute * 60 + second), 12);

            // 第二步：确定本卦
            const benGuaXu = (shangGua - 1) * 8 + xiaGua;
            const benGua = GUA_64[benGuaXu] || GUA_64[1];

            // 第三步：确定体卦和用卦
            let tiNum, yongNum;
            if (dongYao <= 3) {
                tiNum = shangGua;
                yongNum = xiaGua;
            } else {
                tiNum = xiaGua;
                yongNum = shangGua;
            }

            // 第四步：判断体用关系
            const tiYongRel = getTiYongRelation(tiNum, yongNum);

            // 第五步：计算变卦
            const benYao = [...benGua.yao];
            benYao[dongYao - 1] = benYao[dongYao - 1] === 1 ? 0 : 1;
            const bianShangYao = liuYaoToSanYao(benYao, 0, 3);
            const bianXiaYao = liuYaoToSanYao(benYao, 3, 6);
            const bianShangNum = triToNumber(bianShangYao);
            const bianXiaNum = triToNumber(bianXiaYao);
            const bianGuaXu = (bianShangNum - 1) * 8 + bianXiaNum;
            const bianGua = GUA_64[bianGuaXu] || GUA_64[1];

            // 第六步：计算互卦
            const huShangYao = liuYaoToSanYao(benGua.yao, 2, 5);
            const huXiaYao = liuYaoToSanYao(benGua.yao, 1, 4);
            const huShangNum = triToNumber(huShangYao);
            const huXiaNum = triToNumber(huXiaYao);
            const huGuaXu = (huShangNum - 1) * 8 + huXiaNum;
            const huGua = GUA_64[huGuaXu] || GUA_64[1];

            // 返回所有卦象信息
            return {
                year, month, day, hour, minute, second,
                shangGua, xiaGua, dongYao, diZhi,
                benGuaXu, benGua,
                tiNum, yongNum, tiYongRel,
                bianGuaXu, bianGua,
                huShangNum, huXiaNum, huGuaXu, huGua
            };
        }

        // ============================================
        // 彩票号码生成
        // ============================================

        function generateLottery(guaInfo) {
            const { shangGua, xiaGua, dongYao, diZhi, 
                    benGuaXu, tiNum, yongNum, tiYongRel,
                    bianGuaXu, huShangNum, huXiaNum } = guaInfo;

            // 双色球红球（6个来源，基于梅花易数完整原理）
            const redCandidates = [
                guiCang(benGuaXu, 33),                              // ① 本卦卦序
                guiCang(bianGuaXu, 33),                             // ② 变卦卦序
                tiYongBianShu(tiNum, yongNum, tiYongRel.type, dongYao, 33),  // ③ 体用变数
                guiCang(huShangNum * huXiaNum, 33),                 // ④ 互卦积
                guiCang(shangGua * 10 + xiaGua, 33),                // ⑤ 本卦组合
                guiCang(bianGuaXu * getWuXingCoeff(tiYongRel.type), 33) // ⑥ 变卦×五行系数
            ];
            const redBalls = tongChiPeiShu(redCandidates, 33, dongYao).slice(0, 6);

            // 双色球蓝球（1个，独立计算）
            const blueBall = tiYongBianShu(tiNum, yongNum, tiYongRel.type, dongYao + diZhi, 16);

            // 大乐透前区（5个来源）
            const frontCandidates = [
                guiCang(benGuaXu, 35),                              // ① 本卦卦序
                guiCang(bianGuaXu, 35),                             // ② 变卦卦序
                tiYongBianShu(tiNum, yongNum, tiYongRel.type, dongYao, 35),  // ③ 体用变数
                guiCang(huShangNum * huXiaNum + diZhi, 35),         // ④ 互卦积+时辰
                guiCang(dongYao * diZhi * getWuXingCoeff(tiYongRel.type), 35) // ⑤ 动爻×时辰×五行系数
            ];
            const frontBalls = tongChiPeiShu(frontCandidates, 35, dongYao).slice(0, 5);

            // 大乐透后区（2个，基于互卦）
            let backA = guiCang(huShangNum + dongYao, 12);
            let backB = guiCang(huXiaNum + diZhi, 12);
            if (backA === backB) {
                backB++;
                if (backB > 12) backB = 1;
            }
            const backBalls = [backA, backB].sort((a, b) => a - b);

            return {
                redBalls,
                blueBall,
                frontBalls,
                backBalls
            };
        }

        function getQiYunLevel(score) {

            if (score >= 60) return QIYUN_CONFIG.ji;

            if (score >= 20) return QIYUN_CONFIG.xiaoxiong;

        function isTiGuaDeShi(tiNum) {
            const month = new Date().getMonth() + 1;
            const tiWuXing = WU_XING[tiNum];
            
            const season = month >= 3 && month <= 5 ? 'spring' :
                          month >= 6 && month <= 8 ? 'summer' :
                          month >= 9 && month <= 11 ? 'autumn' : 'winter';
            
            const wuxingSeason = {
                spring: '木',
                summer: '火',
                autumn: '金',
                winter: '水'
            };
            
            return tiWuXing === wuxingSeason[season];
        }
        
        function calculateQiYunScore(guaInfo) {
            let score = 50;
            
            const relation = guaInfo.tiYongRel.type;
            if (relation === '用生体') score += 30;
            else if (relation === '体克用') score += 15;
            else if (relation === '比和') score += 10;
            else if (relation === '体生用') score -= 15;
            else if (relation === '用克体') score -= 30;
            
            if (isTiGuaDeShi(guaInfo.tiNum)) {
                score += 10;
            }
            
            return Math.max(0, Math.min(100, score));
        }

        }

        // 获取当前期号
        async function getCurrentPeriod(type) {
            try {
                const response = await fetch(`${LOTTERY_API_URL}?type=${type === 'ssq' ? 'ssq' : 'dlt'}&page=1&limit=1`);
                const data = await response.json();
                if (data.code === 1 && data.data.last) {
                    return data.data.last.code;
                }
            } catch (error) {
                console.error('获取期号失败:', error);
            }
            return type === 'ssq' ? '2026058' : '26056';
        }

        // 获取开奖结果
        async function getLotteryResult(type) {
            try {
                const response = await fetch(`${LOTTERY_API_URL}?type=${type === 'ssq' ? 'ssq' : 'dlt'}&page=1&limit=1`);
                const data = await response.json();
                if (data.code === 1 && data.data.last) {
                    const last = data.data.last;
                    return {
                        period: last.code,
                        date: last.day,
                        redBalls: [last.one, last.two, last.three, last.four, last.five, last.six].map(Number),
                        blueBalls: type === 'ssq' ? [Number(last.seven)] : [Number(last.six), Number(last.seven)]
                    };
                }
            } catch (error) {
                console.error('获取开奖结果失败:', error);
            }
            return null;
        }

        // 双色球中奖匹配
        function matchSSQ(prediction, result) {
            if (!result) return null;
            
            const predReds = prediction.redBalls;
            const predBlue = prediction.blueBall;
            const resultReds = result.redBalls;
            const resultBlue = result.blueBalls[0];

            let matchedRed = predReds.filter(r => resultReds.includes(r)).length;
            let matchedBlue = predBlue === resultBlue ? 1 : 0;

            // 确定奖项
            let prize = null;
            if (matchedRed === 6 && matchedBlue === 1) prize = { level: 1, name: '一等奖', desc: '6+1' };
            else if (matchedRed === 6 && matchedBlue === 0) prize = { level: 2, name: '二等奖', desc: '6+0' };
            else if (matchedRed === 5 && matchedBlue === 1) prize = { level: 3, name: '三等奖', desc: '5+1' };
            else if (matchedRed === 5 && matchedBlue === 0) prize = { level: 4, name: '四等奖', desc: '5+0' };
            else if (matchedRed === 4 && matchedBlue === 1) prize = { level: 4, name: '四等奖', desc: '4+1' };
            else if (matchedRed === 4 && matchedBlue === 0) prize = { level: 5, name: '五等奖', desc: '4+0' };
            else if (matchedRed === 3 && matchedBlue === 1) prize = { level: 5, name: '五等奖', desc: '3+1' };
            else if (matchedRed === 2 && matchedBlue === 1) prize = { level: 6, name: '六等奖', desc: '2+1' };
            else if (matchedRed === 1 && matchedBlue === 1) prize = { level: 6, name: '六等奖', desc: '1+1' };
            else if (matchedRed === 0 && matchedBlue === 1) prize = { level: 6, name: '六等奖', desc: '0+1' };

            return { matchedRed, matchedBlue, prize };
        }

        // 大乐透中奖匹配
        function matchDLT(prediction, result) {
            if (!result) return null;
            
            const predReds = prediction.frontBalls;
            const predBlues = prediction.backBalls;
            const resultReds = result.redBalls;
            const resultBlues = result.blueBalls;

            let matchedRed = predReds.filter(r => resultReds.includes(r)).length;
            let matchedBlue = predBlues.filter(b => resultBlues.includes(b)).length;

            // 确定奖项
            let prize = null;
            if (matchedRed === 5 && matchedBlue === 2) prize = { level: 1, name: '一等奖', desc: '5+2' };
            else if (matchedRed === 5 && matchedBlue === 1) prize = { level: 2, name: '二等奖', desc: '5+1' };
            else if (matchedRed === 5 && matchedBlue === 0) prize = { level: 3, name: '三等奖', desc: '5+0' };
            else if (matchedRed === 4 && matchedBlue === 2) prize = { level: 3, name: '三等奖', desc: '4+2' };
            else if (matchedRed === 4 && matchedBlue === 1) prize = { level: 4, name: '四等奖', desc: '4+1' };
            else if (matchedRed === 3 && matchedBlue === 2) prize = { level: 4, name: '四等奖', desc: '3+2' };
            else if (matchedRed === 4 && matchedBlue === 0) prize = { level: 5, name: '五等奖', desc: '4+0' };
            else if (matchedRed === 3 && matchedBlue === 1) prize = { level: 5, name: '五等奖', desc: '3+1' };
            else if (matchedRed === 2 && matchedBlue === 2) prize = { level: 6, name: '六等奖', desc: '2+2' };
            else if (matchedRed === 3 && matchedBlue === 0) prize = { level: 6, name: '六等奖', desc: '3+0' };
            else if (matchedRed === 1 && matchedBlue === 2) prize = { level: 7, name: '七等奖', desc: '1+2' };
            else if (matchedRed === 2 && matchedBlue === 1) prize = { level: 7, name: '七等奖', desc: '2+1' };
            else if (matchedRed === 0 && matchedBlue === 2) prize = { level: 8, name: '八等奖', desc: '0+2' };
            else if (matchedRed === 1 && matchedBlue === 1) prize = { level: 8, name: '八等奖', desc: '1+1' };
            else if (matchedRed === 2 && matchedBlue === 0) prize = { level: 8, name: '八等奖', desc: '2+0' };

            return { matchedRed, matchedBlue, prize };
        }

        // 加载预测记录
        async function loadPredictionData(type) {
            // 从 JSONBin 加载（所有访问者共享）
            await loadAllData();
        }

        // 保存预测记录
        async function savePrediction(type, lottery) {
            const record = {
                id: `pred_${Date.now()}`,
                timestamp: Date.now(),
                redBalls: type === 'ssq' ? lottery.redBalls : lottery.frontBalls,
                blueBalls: type === 'ssq' ? [lottery.blueBall] : lottery.backBalls,
                matched: null
            };

            predictionData[type].records.push(record);
            
            // 保存到 JSONBin（所有访问者共享）
            await saveAllData();
        }

        // 检查并更新开奖周期
        async function checkPeriod(type) {
            const currentPeriod = await getCurrentPeriod(type);
            
            if (!predictionData[type].currentPeriod || predictionData[type].currentPeriod !== currentPeriod) {
                // 新周期开始，清空上一期记录并开始新记录
                predictionData[type] = {
                    currentPeriod: currentPeriod,
                    records: [],
                    result: null
                };
                
                await saveAllData();
            }
        }

        // 保存预测数据（批量）
        async function savePredictionData(type) {
            // 保存到 JSONBin（所有访问者共享）
            await saveAllData();
        }

        // 渲染预测记录
        function renderPredictions(type) {
            const container = document.getElementById(`${type}Scroll`);
            const records = predictionData[type].records;
            const result = predictionData[type].result;

            if (records.length === 0) {
                container.innerHTML = '<div class="text-center text-[var(--text-secondary)] py-4">暂无预测记录</div>';
                container.classList.remove('prediction-scroll');
                return;
            }

            // 只有当记录足够多时才滚动
            if (records.length < 3) {
                container.classList.remove('prediction-scroll');
            } else {
                container.classList.add('prediction-scroll');
            }

            let html = '';
            records.forEach((record, index) => {
                const matchResult = result ? (type === 'ssq' ? matchSSQ(record, result) : matchDLT(record, result)) : null;
                const prize = matchResult?.prize;
                
                html += `<div class="prediction-item">
                    <div class="flex items-center gap-1">
                        <span class="text-xs text-[var(--text-secondary)] mr-2">#${index + 1}</span>
                        ${renderMiniBalls(record.redBalls, 'red', result?.redBalls)}
                        <span class="text-[var(--text-secondary)] mx-1">+</span>
                        ${renderMiniBalls(record.blueBalls, 'blue', result?.blueBalls)}
                    </div>
                    <div>
                        ${prize ? `<span class="prize-badge prize-${prize.level}">${prize.name}</span>` : '<span class="prize-badge prize-none">待开奖</span>'}
                    </div>
                </div>`;
            });

            // 只有当记录足够多时才复制用于无缝滚动
            if (records.length >= 3) {
                container.innerHTML = html + html;
            } else {
                container.innerHTML = html;
            }
        }

        // 渲染迷你号码球
        function renderMiniBalls(balls, type, winningBalls) {
            return balls.map(ball => {
                // 只有当有开奖结果时，才检查是否匹配
                const isMatched = winningBalls && winningBalls.includes(ball);
                const ballClass = isMatched ? `ball-${type} matched-number` : `ball-${type}`;
                return `<div class="ball ${ballClass}" style="width: 28px; height: 28px; font-size: 0.8rem;">${ball}</div>`;
            }).join('');
        }

        // 渲染开奖结果
        function renderLotteryResult(type, result) {
            const container = document.getElementById(`${type}ResultDisplay`);
            if (result) {
                container.innerHTML = `<strong>开奖号码：</strong>
                    <span class="ball ball-red" style="width: 32px; height: 32px; font-size: 0.9rem; display: inline-block; margin: 0 1px;">${result.redBalls.join('</span><span class="ball ball-red" style="width: 32px; height: 32px; font-size: 0.9rem; display: inline-block; margin: 0 1px;">')}</span>
                    <span class="text-[var(--text-secondary)] mx-1">+</span>
                    <span class="ball ball-blue" style="width: 32px; height: 32px; font-size: 0.9rem; display: inline-block; margin: 0 1px;">${result.blueBalls.join('</span><span class="ball ball-blue" style="width: 32px; height: 32px; font-size: 0.9rem; display: inline-block; margin: 0 1px;">')}</span>
                    <span class="text-[var(--text-secondary)] ml-2">(${result.date})</span>`;
            } else {
                container.innerHTML = '开奖结果：待更新';
            }
        }

        // 刷新开奖数据
        async function refreshLotteryData(type) {
            const result = await getLotteryResult(type);
            const period = await getCurrentPeriod(type);
            
            document.getElementById(`${type}Period`).textContent = `期号：${period}`;
            
            if (result) {
                predictionData[type].result = result;
                await savePredictionData(type);
                renderLotteryResult(type, result);
                renderPredictions(type);
            }
        }

        // 初始化预测记录模块
        async function initPredictionModule() {
            // 从 JSONBin 加载数据（所有访问者共享）
            await loadAllData();
            
            await checkPeriod('ssq');
            await checkPeriod('dlt');
            
            document.getElementById('ssqPeriod').textContent = `期号：${predictionData.ssq.currentPeriod || '--'}`;
            document.getElementById('dltPeriod').textContent = `期号：${predictionData.dlt.currentPeriod || '--'}`;
            
            // 刷新展示
            renderPredictions('ssq');
            renderPredictions('dlt');
            
            // 异步获取开奖结果
            await refreshLotteryData('ssq');
            await refreshLotteryData('dlt');
            
            // 每30分钟自动检查开奖
            setInterval(async () => {
                await refreshLotteryData('ssq');
                await refreshLotteryData('dlt');
            }, 30 * 60 * 1000);
        }

        // 修改主函数，保存预测记录
        function qiGua() {
            incrementQiguaCount();
            const guaInfo = calculateGua();
            const lottery = generateLottery(guaInfo);

            document.getElementById('resultSection').classList.remove('hidden');
            
            renderBalls('redBalls', lottery.redBalls, 'red');
            renderBalls('blueBalls', [lottery.blueBall], 'blue');
            renderBalls('frontBalls', lottery.frontBalls, 'red');
            renderBalls('backBalls', lottery.backBalls, 'blue');
            
            renderGuaInfo('guaInfoShuangse', guaInfo);
            renderGuaInfo('guaInfoDale', guaInfo);
            
            renderDetail('detailShuangse', guaInfo, lottery, 'shuangse');
            renderDetail('detailDale', guaInfo, lottery, 'dale');

            // 保存预测记录
            savePrediction('ssq', lottery);
            savePrediction('dlt', lottery);
            
            // 刷新展示
            renderPredictions('ssq');
            renderPredictions('dlt');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadQiguaCount();
            initPredictionModule();
        });
    </script>
</body>
</html>
