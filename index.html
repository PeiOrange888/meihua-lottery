<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅花易数 · 彩票预测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a0a0a;
            --bg-secondary: #2d1515;
            --accent-red: #8b0000;
            --accent-gold: #d4af37;
            --text-primary: #f5f5dc;
            --text-secondary: #c9b896;
        }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
        }
        
        .chinese-border {
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        
        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .ball-red {
            background: linear-gradient(145deg, #ff4444 0%, #cc0000 50%, #990000 100%);
            color: white;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 
                        inset 3px 3px 6px rgba(255,255,255,0.2),
                        0 4px 8px rgba(0,0,0,0.3);
        }
        
        .ball-blue {
            background: linear-gradient(145deg, #4a90d9 0%, #1e5aa8 50%, #0d3a7a 100%);
            color: white;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 
                        inset 3px 3px 6px rgba(255,255,255,0.2),
                        0 4px 8px rgba(0,0,0,0.3);
        }
        
        .btn-qigua {
            background: linear-gradient(145deg, var(--accent-red) 0%, #6b0000 100%);
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            position: relative;
            min-width: 200px;
        }
        
        .btn-qigua:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }
        
        .btn-qigua:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn-qigua:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-qigua.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .gua-card {
            background: rgba(45, 21, 21, 0.9);
            border: 1px solid var(--accent-gold);
            padding: 1.5rem;
        }
        
        .section-title {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .detail-section {
            background: rgba(26, 10, 10, 0.8);
            border-left: 3px solid var(--accent-gold);
            padding: 1rem;
            margin-top: 1rem;
        }
        
        .qiyun-card {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 0.5rem;
        }
        
        .qiyun-daji {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
            border: 1px solid #ffd700;
            color: #ffd700;
        }
        
        .qiyun-ji {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.2) 0%, rgba(0, 255, 0, 0.1) 100%);
            border: 1px solid #00ff00;
            color: #00ff00;
        }
        
        .qiyun-ping {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid #c0c0c0;
            color: #c0c0c0;
        }
        
        .qiyun-xiaoxiong {
            background: linear-gradient(135deg, rgba(255, 165, 0, 0.2) 0%, rgba(255, 165, 0, 0.1) 100%);
            border: 1px solid #ffa500;
            color: #ffa500;
        }
        
        .qiyun-daxiong {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2) 0%, rgba(255, 0, 0, 0.1) 100%);
            border: 1px solid #ff0000;
            color: #ff0000;
        }
        
        .qiyun-score {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .qiyun-advice {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        .prediction-container {
            max-height: 300px;
            overflow: hidden;
            position: relative;
        }

        .prediction-scroll {
            animation: scrollUp 45s linear infinite;
            will-change: transform;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .prediction-container:hover .prediction-scroll {
            animation-play-state: paused;
        }

        .prediction-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .prediction-item:last-child {
            border-bottom: none;
        }

        .prize-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .prize-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .prize-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .prize-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
        .prize-4 { background: linear-gradient(135deg, #228b22, #006400); color: #fff; }
        .prize-5 { background: linear-gradient(135deg, #4169e1, #1e90ff); color: #fff; }
        .prize-6 { background: linear-gradient(135deg, #696969, #808080); color: #fff; }
        .prize-7 { background: linear-gradient(135deg, #708090, #778899); color: #fff; }
        .prize-8 { background: linear-gradient(135deg, #778899, #a9a9a9); color: #fff; }
        .prize-none { background: transparent; color: #888; font-weight: normal; }

        .matched-number {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
        }

        .period-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .refresh-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(212, 175, 55, 0.3);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .toast.error {
            background: rgba(139, 0, 0, 0.9);
            border: 1px solid #ff4444;
        }
        
        .toast.success {
            background: rgba(0, 100, 0, 0.9);
            border: 1px solid #00ff00;
        }
        
        @media (max-width: 768px) {
            .ball {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
            
            .prediction-container {
                max-height: 250px;
            }
            
            .btn-qigua {
                padding: 0.8rem 1.5rem;
                font-size: 1.2rem;
                min-width: 160px;
            }
        }
    </style>
</head>

        // ============================================
        // 工具函数
        // ============================================
        function guiCang(n, max) {
            const num = Math.round(n);
            let r = num % max;
            return r === 0 ? max : r;
        }

        function tongChiPeiShu(candidates, maxVal, dongYao) {
            let result = [];
            
            for (let val of candidates) {
                let v = val;
                let attempts = 0;
                const maxAttempts = maxVal;
                
                while (result.includes(v) && attempts < maxAttempts) {
                    const step = Math.floor(Math.random() * 11) + 5;
                    const direction = Math.random() > 0.5 ? 1 : -1;
                    v += direction * step;
                    
                    while (v > maxVal) v -= maxVal;
                    while (v < 1) v += maxVal;
                    
                    attempts++;
                }
                
                result.push(v);
            }
            
            for (let i = 1; i < result.length; i++) {
                if (Math.abs(result[i] - result[i-1]) <= 2) {
                    for (let j = 0; j < result.length; j++) {
                        if (j !== i && Math.abs(result[j] - result[i-1]) > 3 && Math.abs(result[j] - result[i]) > 3) {
                            [result[i], result[j]] = [result[j], result[i]];
                            break;
                        }
                    }
                }
            }
            
            return result.sort((a, b) => a - b);
        }

        function tiYongBianShu(ti, yong, relation, base, max) {
            const coeff = {
                '体生用': 0.7, '体克用': 1.3, '用生体': 1.1, '用克体': 0.9, '比和': 1.0
            };
            
            let result;
            const c = coeff[relation] || 1.0;
            
            if (relation === '比和') {
                result = Math.round((ti * yong + base) * c);
            } else if (relation === '体生用' || relation === '用生体') {
                result = Math.round((ti + yong + base) * c);
            } else {
                result = Math.round((Math.abs(ti - yong) + base) * c);
            }
            
            return guiCang(result, max);
        }

        function getWuXingCoeff(relation) {
            const coeff = { '体生用': 0.7, '体克用': 1.3, '用生体': 1.1, '用克体': 0.9, '比和': 1.0 };
            return coeff[relation] || 1.0;
        }

        function getTiYongRelation(ti_num, yong_num) {
            const ti_wx = WUXING[ti_num];
            const yong_wx = WUXING[yong_num];
            
            if (SHENG[ti_wx] === yong_wx) return { type: '体生用', desc: `体${ti_wx}生用${yong_wx}` };
            if (KE[ti_wx] === yong_wx) return { type: '体克用', desc: `体${ti_wx}克用${yong_wx}` };
            if (SHENG[yong_wx] === ti_wx) return { type: '用生体', desc: `体${ti_wx}被用${yong_wx}生` };
            if (KE[yong_wx] === ti_wx) return { type: '用克体', desc: `体${ti_wx}被用${yong_wx}克` };
            return { type: '比和', desc: `体${ti_wx}比用${yong_wx}` };
        }

        function triToNumber(yao) {
            return TRI_TO_NUM[yao.join('')] || 1;
        }

        function liuYaoToSanYao(yao, start, end) {
            return yao.slice(start, end);
        }

        // ============================================
        // 起卦引擎
        // ============================================
        function calculateGua() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hour = now.getHours();
            const minute = now.getMinutes();
            const second = now.getSeconds();

            document.getElementById('timeDisplay').textContent = 
                `${year}年${month}月${day}日 ${hour}时${minute}分${second}秒`;

            const sum1 = year + month + day;
            const sum2 = year + month + day + hour + minute + second;
            
            const shangGua = guiCang(sum1, 8);
            const xiaGua = guiCang(sum2, 8);
            const dongYao = guiCang(sum2, 6);
            const diZhi = guiCang((hour * 3600 + minute * 60 + second), 12);

            const benGuaXu = (shangGua - 1) * 8 + xiaGua;
            const benGua = GUA_64[benGuaXu] || GUA_64[1];

            let tiNum, yongNum;
            if (dongYao <= 3) {
                tiNum = shangGua;
                yongNum = xiaGua;
            } else {
                tiNum = xiaGua;
                yongNum = shangGua;
            }

            const tiYongRel = getTiYongRelation(tiNum, yongNum);

            const benYao = [...benGua.yao];
            benYao[dongYao - 1] = benYao[dongYao - 1] === 1 ? 0 : 1;
            const bianShangYao = liuYaoToSanYao(benYao, 0, 3);
            const bianXiaYao = liuYaoToSanYao(benYao, 3, 6);
            const bianShangNum = triToNumber(bianShangYao);
            const bianXiaNum = triToNumber(bianXiaYao);
            const bianGuaXu = (bianShangNum - 1) * 8 + bianXiaNum;
            const bianGua = GUA_64[bianGuaXu] || GUA_64[1];

            const huShangYao = liuYaoToSanYao(benGua.yao, 2, 5);
            const huXiaYao = liuYaoToSanYao(benGua.yao, 1, 4);
            const huShangNum = triToNumber(huShangYao);
            const huXiaNum = triToNumber(huXiaYao);
            const huGuaXu = (huShangNum - 1) * 8 + huXiaNum;
            const huGua = GUA_64[huGuaXu] || GUA_64[1];

            return {
                year, month, day, hour, minute, second,
                shangGua, xiaGua, dongYao, diZhi,
                benGuaXu, benGua,
                tiNum, yongNum, tiYongRel,
                bianGuaXu, bianGua,
                huShangNum, huXiaNum, huGuaXu, huGua
            };
        }

        function generateLottery(guaInfo) {
            const { shangGua, xiaGua, dongYao, diZhi, benGuaXu, tiNum, yongNum, tiYongRel, bianGuaXu, huShangNum, huXiaNum } = guaInfo;

            const redCandidates = [
                guiCang(benGuaXu, 33),
                guiCang(bianGuaXu, 33),
                tiYongBianShu(tiNum, yongNum, tiYongRel.type, dongYao, 33),
                guiCang(huShangNum * huXiaNum, 33),
                guiCang(shangGua * 10 + xiaGua, 33),
                guiCang(bianGuaXu * getWuXingCoeff(tiYongRel.type), 33)
            ];
            const redBalls = tongChiPeiShu(redCandidates, 33, dongYao).slice(0, 6);
            const blueBall = tiYongBianShu(tiNum, yongNum, tiYongRel.type, dongYao + diZhi, 16);

            const frontCandidates = [
                guiCang(benGuaXu, 35),
                guiCang(bianGuaXu, 35),
                tiYongBianShu(tiNum, yongNum, tiYongRel.type, dongYao, 35),
                guiCang(huShangNum * huXiaNum + diZhi, 35),
                guiCang(dongYao * diZhi * getWuXingCoeff(tiYongRel.type), 35)
            ];
            const frontBalls = tongChiPeiShu(frontCandidates, 35, dongYao).slice(0, 5);

            let backA = guiCang(huShangNum + dongYao, 12);
            let backB = guiCang(huXiaNum + diZhi, 12);
            if (backA === backB) {
                backB++;
                if (backB > 12) backB = 1;
            }
            const backBalls = [backA, backB].sort((a, b) => a - b);

            return { redBalls, blueBall, frontBalls, backBalls };
        }

        function getQiYunLevel(score) {

        function isTiGuaDeShi(tiNum) {
            const month = new Date().getMonth() + 1;
            const tiWuXing = WU_XING[tiNum];
            
            const season = month >= 3 && month <= 5 ? 'spring' :
                          month >= 6 && month <= 8 ? 'summer' :
                          month >= 9 && month <= 11 ? 'autumn' : 'winter';
            
            const wuxingSeason = { spring: '木', summer: '火', autumn: '金', winter: '水' };
            return tiWuXing === wuxingSeason[season];
        }
        
        function calculateQiYunScore(guaInfo) {
            let score = 50;
            
            const relation = guaInfo.tiYongRel.type;
            if (relation === '用生体') score += 30;
            else if (relation === '体克用') score += 15;
            else if (relation === '比和') score += 10;
            else if (relation === '体生用') score -= 15;
            else if (relation === '用克体') score -= 30;
            
            if (isTiGuaDeShi(guaInfo.tiNum)) score += 10;
            
            return Math.max(0, Math.min(100, score));
        }
        
        function testQiYun() {
            const cacheKey = getQiYunCacheKey();
            const cached = localStorage.getItem(cacheKey);
            
            if (cached) {
                displayQiYun(JSON.parse(cached));
                return;
            }
            
            const guaInfo = calculateGua();
            const score = calculateQiYunScore(guaInfo);
            const level = getQiYunLevel(score);
            
            const qiyun = {
                score: score,
                level: level,
                guaInfo: { benGua: guaInfo.benGua.name, tiYong: guaInfo.tiYongRel.desc }
            };
            
            localStorage.setItem(cacheKey, JSON.stringify(qiyun));
            displayQiYun(qiyun);
        }
        
        function displayQiYun(qiyun) {
            const container = document.getElementById('qiyunDisplay');
            const level = qiyun.level;
            
            container.innerHTML = `
                <div class="qiyun-card qiyun-${level.color}">
                    <div class="text-2xl font-bold mb-2">${level.name}</div>
                    <div class="qiyun-score">${qiyun.score}分</div>
                    <p class="mt-2">${level.desc}</p>
                    <div class="qiyun-advice">${level.advice}</div>
                </div>
            `;
        }

        // ============================================
        // 中奖匹配
        // ============================================
        function matchSSQ(prediction, result) {
            if (!result) return null;
            
            const predReds = prediction.redBalls;
            const predBlue = prediction.blueBall;
            const resultReds = result.redBalls;
            const resultBlue = result.blueBalls[0];

            let matchedRed = predReds.filter(r => resultReds.includes(r)).length;
            let matchedBlue = predBlue === resultBlue ? 1 : 0;

            let prize = null;
            if (matchedRed === 6 && matchedBlue === 1) prize = { level: 1, name: '一等奖', desc: '6+1' };
            else if (matchedRed === 6 && matchedBlue === 0) prize = { level: 2, name: '二等奖', desc: '6+0' };
            else if (matchedRed === 5 && matchedBlue === 1) prize = { level: 3, name: '三等奖', desc: '5+1' };
            else if (matchedRed === 5 && matchedBlue === 0) prize = { level: 4, name: '四等奖', desc: '5+0' };
            else if (matchedRed === 4 && matchedBlue === 1) prize = { level: 4, name: '四等奖', desc: '4+1' };
            else if (matchedRed === 4 && matchedBlue === 0) prize = { level: 5, name: '五等奖', desc: '4+0' };
            else if (matchedRed === 3 && matchedBlue === 1) prize = { level: 5, name: '五等奖', desc: '3+1' };
            else if (matchedRed === 2 && matchedBlue === 1) prize = { level: 6, name: '六等奖', desc: '2+1' };
            else if (matchedRed === 1 && matchedBlue === 1) prize = { level: 6, name: '六等奖', desc: '1+1' };
            else if (matchedRed === 0 && matchedBlue === 1) prize = { level: 6, name: '六等奖', desc: '0+1' };

            return { matchedRed, matchedBlue, prize };
        }

        function matchDLT(prediction, result) {
            if (!result) return null;
            
            const predReds = prediction.redBalls || prediction.frontBalls;
            const predBlues = prediction.blueBalls || prediction.backBalls;
            const resultReds = result.redBalls;
            const resultBlues = result.blueBalls;

            let matchedRed = predReds.filter(r => resultReds.includes(r)).length;
            let matchedBlue = predBlues.filter(b => resultBlues.includes(b)).length;

            let prize = null;
            if (matchedRed === 5 && matchedBlue === 2) prize = { level: 1, name: '一等奖', desc: '5+2' };
            else if (matchedRed === 5 && matchedBlue === 1) prize = { level: 2, name: '二等奖', desc: '5+1' };
            else if (matchedRed === 5 && matchedBlue === 0) prize = { level: 3, name: '三等奖', desc: '5+0' };
            else if (matchedRed === 4 && matchedBlue === 2) prize = { level: 3, name: '三等奖', desc: '4+2' };
            else if (matchedRed === 4 && matchedBlue === 1) prize = { level: 4, name: '四等奖', desc: '4+1' };
            else if (matchedRed === 3 && matchedBlue === 2) prize = { level: 4, name: '四等奖', desc: '3+2' };
            else if (matchedRed === 4 && matchedBlue === 0) prize = { level: 5, name: '五等奖', desc: '4+0' };
            else if (matchedRed === 3 && matchedBlue === 1) prize = { level: 5, name: '五等奖', desc: '3+1' };
            else if (matchedRed === 2 && matchedBlue === 2) prize = { level: 6, name: '六等奖', desc: '2+2' };
            else if (matchedRed === 3 && matchedBlue === 0) prize = { level: 6, name: '六等奖', desc: '3+0' };
            else if (matchedRed === 1 && matchedBlue === 2) prize = { level: 7, name: '七等奖', desc: '1+2' };
            else if (matchedRed === 2 && matchedBlue === 1) prize = { level: 7, name: '七等奖', desc: '2+1' };
            else if (matchedRed === 0 && matchedBlue === 2) prize = { level: 8, name: '八等奖', desc: '0+2' };
            else if (matchedRed === 1 && matchedBlue === 1) prize = { level: 8, name: '八等奖', desc: '1+1' };
            else if (matchedRed === 2 && matchedBlue === 0) prize = { level: 8, name: '八等奖', desc: '2+0' };

            return { matchedRed, matchedBlue, prize };
        }

        // ============================================
        // API调用
        // ============================================
        const API = {
            async getCurrentPeriod(type) {
                try {
                    const response = await fetch(`${CONFIG.LOTTERY_API_URL}?type=${type === 'ssq' ? 'ssq' : 'dlt'}&page=1&limit=1`);
                    const data = await response.json();
                    if (data.code === 1 && data.data.last) {
                        return data.data.last.code;
                    }
                } catch (error) {
                    console.error('获取期号失败:', error);
                }
                return type === 'ssq' ? '2026058' : '26056';
            },

            async getLotteryResult(type) {
                try {
                    const response = await fetch(`${CONFIG.LOTTERY_API_URL}?type=${type === 'ssq' ? 'ssq' : 'dlt'}&page=1&limit=1`);
                    const data = await response.json();
                    if (data.code === 1 && data.data.last) {
                        const last = data.data.last;
                        return {
                            period: last.code,
                            date: last.day,
                            redBalls: [last.one, last.two, last.three, last.four, last.five, last.six].map(Number),
                            blueBalls: type === 'ssq' ? [Number(last.seven)] : [Number(last.six), Number(last.seven)]
                        };
                    }
                } catch (error) {
                    console.error('获取开奖结果失败:', error);
                }
                return null;
            }
        };

        // ============================================
        // 周期管理
        // ============================================
        async function checkPeriod(type) {
            const currentPeriod = await API.getCurrentPeriod(type);
            
            if (!DataStore.data[type].currentPeriod) {
                DataStore.data[type].currentPeriod = currentPeriod;
                await DataStore.saveNow();
                return;
            }
            
            if (DataStore.data[type].currentPeriod !== currentPeriod) {
                const lastResult = await API.getLotteryResult(type);
                
                if (DataStore.data[type].records.length > 0) {
                    const matchedRecords = DataStore.data[type].records.map(record => {
                        if (lastResult) {
                            const matchResult = type === 'ssq' ? matchSSQ(record, lastResult) : matchDLT(record, lastResult);
                            return { ...record, matchResult };
                        }
                        return record;
                    });
                    
                    const historyItem = {
                        period: DataStore.data[type].currentPeriod,
                        records: matchedRecords,
                        result: lastResult,
                        endTime: Date.now()
                    };
                    DataStore.data[type].history.unshift(historyItem);
                    if (DataStore.data[type].history.length > CONFIG.MAX_HISTORY) {
                        DataStore.data[type].history.pop();
                    }
                }
                
                DataStore.data[type].currentPeriod = currentPeriod;
                DataStore.data[type].records = [];
                DataStore.data[type].result = null;
                
                await DataStore.saveNow();
            }
        }

        // ============================================
        // 起卦主函数
        // ============================================
        async function qiGuaSSQ() {
            const btnId = 'qiguaBtnSSQ';
            UI.setButtonLoading(btnId, true);
            
            try {
                const count = DataStore.incrementQiguaCount();
                UI.updateQiguaDisplay(count);
                
                const guaInfo = calculateGua();
                const lottery = generateLottery(guaInfo);

                document.getElementById('resultSection').classList.remove('hidden');
                
                UI.renderBalls('redBalls', lottery.redBalls, 'red');
                UI.renderBalls('blueBalls', [lottery.blueBall], 'blue');
                UI.renderGuaInfo('guaInfoShuangse', guaInfo);
                UI.renderDetail('detailShuangse', guaInfo, lottery, 'shuangse');

                const record = {
                    id: `pred_${Date.now()}`,
                    timestamp: Date.now(),
                    redBalls: lottery.redBalls,
                    blueBalls: [lottery.blueBall],
                    matched: null
                };
                
                DataStore.addRecord('ssq', record);
                UI.renderPredictions('ssq');
            } finally {
                UI.setButtonLoading(btnId, false);
            }
        }

        async function qiGuaDLT() {
            const btnId = 'qiguaBtnDLT';
            UI.setButtonLoading(btnId, true);
            
            try {
                const count = DataStore.incrementQiguaCount();
                UI.updateQiguaDisplay(count);
                
                const guaInfo = calculateGua();
                const lottery = generateLottery(guaInfo);

                document.getElementById('resultSection').classList.remove('hidden');
                
                UI.renderBalls('frontBalls', lottery.frontBalls, 'red');
                UI.renderBalls('backBalls', lottery.backBalls, 'blue');
                UI.renderGuaInfo('guaInfoDale', guaInfo);
                UI.renderDetail('detailDale', guaInfo, lottery, 'dale');

                const record = {
                    id: `pred_${Date.now()}`,
                    timestamp: Date.now(),
                    redBalls: lottery.frontBalls,
                    blueBalls: lottery.backBalls,
                    matched: null
                };
                
                DataStore.addRecord('dlt', record);
                UI.renderPredictions('dlt');
            } finally {
                UI.setButtonLoading(btnId, false);
            }
        }

        function toggleDetail(type) {
            const detail = document.getElementById(`detail${type.charAt(0).toUpperCase() + type.slice(1)}`);
            const btn = detail.previousElementSibling;
            
            if (detail.classList.contains('hidden')) {
                detail.classList.remove('hidden');
                btn.textContent = '[ 收起详细推导 ]';
            } else {
                detail.classList.add('hidden');
                btn.textContent = '[ 查看详细推导 ]';
            }
        }

        async function refreshLotteryData(type) {
            const result = await API.getLotteryResult(type);
            const period = await API.getCurrentPeriod(type);
            
            document.getElementById(`${type}Period`).textContent = `期号：${period}`;
            
            if (result) {
                DataStore.data[type].result = result;
                await DataStore.saveNow();
                UI.renderLotteryResult(type, result);
                UI.renderPredictions(type);
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================
        // 初始化
        // ============================================
        async function init() {
            await DataStore.load();
            
            UI.updateQiguaDisplay(DataStore.data.qigua_count);
            
            await checkPeriod('ssq');
            await checkPeriod('dlt');
            
            document.getElementById('ssqPeriod').textContent = `期号：${DataStore.data.ssq.currentPeriod || '--'}`;
            document.getElementById('dltPeriod').textContent = `期号：${DataStore.data.dlt.currentPeriod || '--'}`;
            
            UI.renderPredictions('ssq');
            UI.renderPredictions('dlt');
            
            await refreshLotteryData('ssq');
            await refreshLotteryData('dlt');
            
            setInterval(async () => {
                await refreshLotteryData('ssq');
                await refreshLotteryData('dlt');
            }, 30 * 60 * 1000);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
