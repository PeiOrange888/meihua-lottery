<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅花易数 · 彩票预测</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css?v=2.2.1">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>梅花易数</h1>
            <p class="subtitle">以易道观天机，以数理测运势</p>
            <p id="user-nickname" class="text-sm"></p>
        </header>

        <!-- 气运测试 -->
        <section class="gua-border">
            <h3 class="section-title">今日气运</h3>
            <div id="qiyun-display">
                <p class="text-center text-secondary">点击按钮测试今日气运</p>
            </div>
            <div class="text-center mt-4">
                <button id="btn-qiyun" class="btn btn-cinnabar">测试气运</button>
            </div>
        </section>

        <!-- 起卦按钮 -->
        <section class="gua-border">
            <h3 class="section-title">起卦测号</h3>
            <div class="flex-center flex-wrap gap-4">
                <button id="btn-ssq" class="btn">福彩双色球</button>
                <button id="btn-dlt" class="btn">体彩大乐透</button>
            </div>
            <p id="time-display" class="text-center text-secondary mt-4 text-sm"></p>
        </section>

        <!-- 结果展示 -->
        <section id="result-section" class="hidden">
            <div class="grid-2">
                <!-- 双色球 -->
                <div class="gua-border">
                    <h3 class="section-title">福彩双色球</h3>
                    <div class="mb-4">
                        <p class="text-sm text-secondary mb-4">红球</p>
                        <div id="ssq-red" class="flex-wrap flex-center"></div>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm text-secondary mb-4">蓝球</p>
                        <div id="ssq-blue" class="flex-wrap flex-center"></div>
                    </div>
                    <div class="detail-box">
                        <div id="ssq-info" class="text-sm"></div>
                        <button class="detail-toggle text-sm" onclick="UI.toggleDetail('ssq')">查看详细推导</button>
                        <div id="ssq-detail" class="hidden mt-4 text-sm text-secondary"></div>
                    </div>
                </div>

                <!-- 大乐透 -->
                <div class="gua-border">
                    <h3 class="section-title">体彩大乐透</h3>
                    <div class="mb-4">
                        <p class="text-sm text-secondary mb-4">前区</p>
                        <div id="dlt-front" class="flex-wrap flex-center"></div>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm text-secondary mb-4">后区</p>
                        <div id="dlt-back" class="flex-wrap flex-center"></div>
                    </div>
                    <div class="detail-box">
                        <div id="dlt-info" class="text-sm"></div>
                        <button class="detail-toggle text-sm" onclick="UI.toggleDetail('dlt')">查看详细推导</button>
                        <div id="dlt-detail" class="hidden mt-4 text-sm text-secondary"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 预测记录 -->
        <section class="mb-8">
            <!-- 双色球记录 -->
            <div class="gua-border mb-8">
                <div class="section-head">
                    <h3 class="section-title mb-0">福彩预测记录</h3>
                    <div class="flex-center gap-4">
                        <span id="ssq-period" class="text-sm text-secondary">期号：--</span>
                    </div>
                </div>
                <div id="ssq-result" class="mb-4 text-sm text-secondary"></div>
                <div class="record-container">
                    <div id="ssq-records" class="record-scroll">
                        <p class="text-center py-4 text-secondary">暂无预测</p>
                    </div>
                </div>
            </div>

            <!-- 大乐透记录 -->
            <div class="gua-border mb-8">
                <div class="section-head">
                    <h3 class="section-title mb-0">体彩预测记录</h3>
                    <div class="flex-center gap-4">
                        <span id="dlt-period" class="text-sm text-secondary">期号：--</span>
                    </div>
                </div>
                <div id="dlt-result" class="mb-4 text-sm text-secondary"></div>
                <div class="record-container">
                    <div id="dlt-records" class="record-scroll">
                        <p class="text-center py-4 text-secondary">暂无预测</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 历史记录 -->
        <section class="gua-border mb-8">
            <h3 class="section-title text-center">历史中奖</h3>
            <div class="filter-bar">
                <button class="filter-btn active" data-history-range="all">全部</button>
                <button class="filter-btn" data-history-range="7">近7天</button>
                <button class="filter-btn" data-history-range="30">近30天</button>
                <button class="filter-btn" data-history-range="90">近90天</button>
            </div>
            <div class="grid-2">
                <div>
                    <p class="text-sm text-secondary mb-4">福彩双色球</p>
                    <div id="ssq-history">
                        <p class="text-center text-secondary">暂无记录</p>
                    </div>
                </div>
                <div>
                    <p class="text-sm text-secondary mb-4">体彩大乐透</p>
                    <div id="dlt-history">
                        <p class="text-center text-secondary">暂无记录</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 结算明细 -->
        <section class="gua-border mb-8">
            <h3 class="section-title text-center">结算明细</h3>
            <div class="grid-2">
                <div>
                    <p class="text-sm text-secondary mb-4">福彩双色球</p>
                    <div id="ssq-settled">
                        <p class="text-center text-secondary">暂无结算</p>
                    </div>
                </div>
                <div>
                    <p class="text-sm text-secondary mb-4">体彩大乐透</p>
                    <div id="dlt-settled">
                        <p class="text-center text-secondary">暂无结算</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 底部 -->
        <footer class="text-center text-sm text-secondary mt-8">
            <p>卦以载道，数以明理。彩票开奖乃随机之事，此工具仅供娱乐。</p>
            <div class="footer-stats mt-4 text-sm">
                <span>访问 <span id="busuanzi_value_site_pv">0</span> 次</span>
                <span>访客 <span id="busuanzi_value_site_uv">0</span> 人</span>
                <span>起卦 <span id="qigua-count">0</span> 次</span>
            </div>
        </footer>
    </div>

    <div id="toast" class="toast"></div>

    <script src="assets/js/config.js?v=2.2.1"></script>
    <script src="assets/js/data.js?v=2.2.1"></script>
    <script src="assets/js/logic.js?v=2.2.1"></script>
    <script src="assets/js/ui.js?v=2.2.1"></script>
    <script src="assets/js/app.js?v=2.2.1"></script>
</body>
</html>
