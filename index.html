<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梅花易数 · 彩票预测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a0a0a;
            --bg-secondary: #2d1515;
            --accent-red: #8b0000;
            --accent-gold: #d4af37;
            --text-primary: #f5f5dc;
            --text-secondary: #c9b896;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            margin: 0;
            color: var(--text-primary);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .card {
            background: rgba(45, 21, 21, 0.9);
            border: 2px solid var(--accent-gold);
            border-radius: 0.5rem;
            padding: 1.5rem;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        
        .title {
            color: var(--accent-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .section-title {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .btn {
            background: linear-gradient(145deg, var(--accent-red) 0%, #6b0000 100%);
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            padding: 1rem 2rem;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            min-width: 180px;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn.loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .ball {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            margin: 2px;
        }
        
        .ball-red {
            background: linear-gradient(145deg, #ff4444 0%, #cc0000 50%, #990000 100%);
            color: white;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4), inset 2px 2px 4px rgba(255,255,255,0.2), 0 3px 6px rgba(0,0,0,0.3);
        }
        
        .ball-blue {
            background: linear-gradient(145deg, #4a90d9 0%, #1e5aa8 50%, #0d3a7a 100%);
            color: white;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4), inset 2px 2px 4px rgba(255,255,255,0.2), 0 3px 6px rgba(0,0,0,0.3);
        }
        
        .ball-small {
            width: 28px;
            height: 28px;
            font-size: 0.8rem;
            margin: 1px;
        }
        
        .matched {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); }
        }
        
        .qiyun-card {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .qiyun-daji { background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1)); border: 1px solid #ffd700; color: #ffd700; }
        .qiyun-ji { background: linear-gradient(135deg, rgba(0, 255, 0, 0.2), rgba(0, 255, 0, 0.1)); border: 1px solid #00ff00; color: #00ff00; }
        .qiyun-ping { background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05)); border: 1px solid #c0c0c0; color: #c0c0c0; }
        .qiyun-xiaoxiong { background: linear-gradient(135deg, rgba(255, 165, 0, 0.2), rgba(255, 165, 0, 0.1)); border: 1px solid #ffa500; color: #ffa500; }
        .qiyun-daxiong { background: linear-gradient(135deg, rgba(255, 0, 0, 0.2), rgba(255, 0, 0, 0.1)); border: 1px solid #ff0000; color: #ff0000; }
        
        .record-container {
            max-height: 280px;
            overflow: hidden;
        }
        
        .record-scroll {
            animation: scrollUp 40s linear infinite;
            will-change: transform;
        }
        
        .record-container:hover .record-scroll {
            animation-play-state: paused;
        }
        
        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }
        
        .record-item {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }
        
        .prize-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .prize-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .prize-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .prize-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
        .prize-4 { background: linear-gradient(135deg, #228b22, #006400); color: #fff; }
        .prize-5 { background: linear-gradient(135deg, #4169e1, #1e90ff); color: #fff; }
        .prize-6 { background: linear-gradient(135deg, #696969, #808080); color: #fff; }
        .prize-7 { background: linear-gradient(135deg, #708090, #778899); color: #fff; }
        .prize-8 { background: linear-gradient(135deg, #778899, #a9a9a9); color: #fff; }
        .prize-none { background: transparent; color: #888; font-weight: normal; }
        
        .detail-box {
            background: rgba(26, 10, 10, 0.8);
            border-left: 3px solid var(--accent-gold);
            padding: 1rem;
            margin-top: 1rem;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast.show { opacity: 1; }
        .toast.error { background: rgba(139, 0, 0, 0.9); border: 1px solid #ff4444; }
        
        @media (max-width: 768px) {
            .ball { width: 36px; height: 36px; font-size: 0.9rem; }
            .ball-small { width: 24px; height: 24px; font-size: 0.7rem; }
            .btn { padding: 0.8rem 1.5rem; font-size: 1rem; min-width: 150px; }
            .record-container { max-height: 220px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold title mb-2">梅花易数 · 彩票预测</h1>
            <p class="text-lg" style="color: var(--text-secondary)">仅供娱乐</p>
        </header>

        <!-- 气运测试 -->
        <section class="text-center mb-10">
            <div class="card inline-block">
                <h3 class="section-title text-xl font-bold">今日气运</h3>
                <div id="qiyun-display">
                    <p style="color: var(--text-secondary)">点击按钮测试今日气运</p>
                </div>
                <button id="btn-qiyun" class="btn mt-4">测试气运</button>
            </div>
        </section>

        <!-- 起卦按钮 -->
        <section class="text-center mb-10">
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button id="btn-ssq" class="btn">福彩双色球起卦</button>
                <button id="btn-dlt" class="btn">体彩大乐透起卦</button>
            </div>
            <p id="time-display" class="mt-4 text-sm" style="color: var(--text-secondary)"></p>
        </section>

        <!-- 结果展示 -->
        <section id="result-section" class="mb-10 hidden">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- 双色球 -->
                <div class="card">
                    <h2 class="section-title text-xl font-bold">福彩双色球</h2>
                    <div class="mb-4">
                        <p class="text-sm mb-2" style="color: var(--text-secondary)">红球区</p>
                        <div id="ssq-red" class="flex flex-wrap gap-1 justify-center"></div>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm mb-2" style="color: var(--text-secondary)">蓝球区</p>
                        <div id="ssq-blue" class="flex gap-1 justify-center"></div>
                    </div>
                    <div class="detail-box">
                        <div id="ssq-info" class="text-sm"></div>
                        <button class="text-sm mt-2 hover:underline" style="color: var(--accent-gold)" onclick="UI.toggleDetail('ssq')">[ 查看详细推导 ]</button>
                        <div id="ssq-detail" class="hidden mt-3 text-xs" style="color: var(--text-secondary)"></div>
                    </div>
                </div>
                
                <!-- 大乐透 -->
                <div class="card">
                    <h2 class="section-title text-xl font-bold">体彩大乐透</h2>
                    <div class="mb-4">
                        <p class="text-sm mb-2" style="color: var(--text-secondary)">前区</p>
                        <div id="dlt-front" class="flex flex-wrap gap-1 justify-center"></div>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm mb-2" style="color: var(--text-secondary)">后区</p>
                        <div id="dlt-back" class="flex gap-1 justify-center"></div>
                    </div>
                    <div class="detail-box">
                        <div id="dlt-info" class="text-sm"></div>
                        <button class="text-sm mt-2 hover:underline" style="color: var(--accent-gold)" onclick="UI.toggleDetail('dlt')">[ 查看详细推导 ]</button>
                        <div id="dlt-detail" class="hidden mt-3 text-xs" style="color: var(--text-secondary)"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 预测记录 -->
        <section class="space-y-6">
            <!-- 双色球记录 -->
            <div class="card">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="section-title text-xl font-bold mb-0">福彩双色球 · 预测记录</h2>
                    <div class="flex items-center gap-3">
                        <span id="ssq-period" class="text-sm" style="color: var(--text-secondary)">期号：--</span>
                        <button class="btn text-sm py-1 px-3" style="font-size: 0.85rem; padding: 0.4rem 0.8rem;" onclick="App.refreshData('ssq')">刷新</button>
                    </div>
                </div>
                <div id="ssq-result" class="mb-3 text-sm" style="color: var(--text-secondary)"></div>
                <div class="record-container">
                    <div id="ssq-records" class="record-scroll">
                        <p class="text-center py-4" style="color: var(--text-secondary)">加载中...</p>
                    </div>
                </div>
            </div>

            <!-- 大乐透记录 -->
            <div class="card">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="section-title text-xl font-bold mb-0">体彩大乐透 · 预测记录</h2>
                    <div class="flex items-center gap-3">
                        <span id="dlt-period" class="text-sm" style="color: var(--text-secondary)">期号：--</span>
                        <button class="btn text-sm py-1 px-3" style="font-size: 0.85rem; padding: 0.4rem 0.8rem;" onclick="App.refreshData('dlt')">刷新</button>
                    </div>
                </div>
                <div id="dlt-result" class="mb-3 text-sm" style="color: var(--text-secondary)"></div>
                <div class="record-container">
                    <div id="dlt-records" class="record-scroll">
                        <p class="text-center py-4" style="color: var(--text-secondary)">加载中...</p>
                    </div>
                </div>
            </div>

            <!-- 历史记录 -->
            <div class="card">
                <h2 class="text-xl font-bold text-center title mb-6">🏆 历史中奖记录</h2>
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="text-lg font-bold mb-3" style="color: var(--accent-gold)">福彩双色球</h3>
                        <div id="ssq-history">
                            <p class="text-center py-4" style="color: var(--text-secondary)">加载中...</p>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold mb-3" style="color: var(--accent-gold)">体彩大乐透</h3>
                        <div id="dlt-history">
                            <p class="text-center py-4" style="color: var(--text-secondary)">加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 底部 -->
        <footer class="mt-10 text-center text-sm" style="color: var(--text-secondary)">
            <p>温馨提示：彩票开奖为独立随机事件，本工具基于梅花易数算法生成号码，仅供文化娱乐，不构成投注建议。请理性购彩。</p>
            <div class="mt-3 flex justify-center gap-4 text-xs">
                <span>访问 <span id="pv">0</span> 次</span>
                <span>访客 <span id="uv">0</span> 人</span>
                <span>起卦 <span id="qigua-count">0</span> 次</span>
            </div>
        </footer>
    </div>

    <div id="toast" class="toast"></div>

    <script>
    (function() {

        };

        // ============================================
        // 常量定义
        // ============================================
        const WUXING = { 1:'金', 2:'金', 3:'火', 4:'木', 5:'木', 6:'水', 7:'土', 8:'土' };

        const KE = { '木':'土', '土':'水', '水':'火', '火':'金', '金':'木' };
        const TRI_TO_NUM = { '111':1, '011':2, '101':3, '001':4, '110':5, '010':6, '100':7, '000':8 };

        const GUA_64 = {

            3:{name:'水雷屯',yao:[0,1,0,1,0,0]}, 4:{name:'山水蒙',yao:[1,0,0,1,0,0]},
            5:{name:'水天需',yao:[1,1,1,0,1,0]}, 6:{name:'天水讼',yao:[0,1,0,1,1,1]},
            7:{name:'地水师',yao:[0,1,0,0,0,0]}, 8:{name:'水地比',yao:[0,0,0,0,1,0]},

            15:{name:'地山谦',yao:[0,0,1,0,0,0]}, 16:{name:'雷地豫',yao:[0,0,0,0,1,0]},
            17:{name:'泽雷随',yao:[0,1,0,0,1,0]}, 18:{name:'山风蛊',yao:[0,1,0,0,0,1]},
            19:{name:'地泽临',yao:[0,1,0,0,0,0]}, 20:{name:'风地观',yao:[0,0,0,1,1,0]},
            21:{name:'火雷噬嗑',yao:[0,1,0,0,1,0]}, 22:{name:'山火贲',yao:[0,1,0,1,0,0]},
            23:{name:'山地剥',yao:[0,0,0,1,0,0]}, 24:{name:'地雷复',yao:[0,1,0,0,0,0]},

            39:{name:'山蹇',yao:[0,0,1,0,0,0]}, 40:{name:'雷水解',yao:[0,1,0,0,1,0]},
            41:{name:'山泽损',yao:[0,1,0,1,0,0]}, 42:{name:'风雷益',yao:[0,1,0,1,1,0]},
            43:{name:'泽天夬',yao:[1,1,1,1,0,1]}, 44:{name:'天风姤',yao:[0,1,1,1,1,1]},
            45:{name:'泽地萃',yao:[0,0,0,0,1,0]}, 46:{name:'地风升',yao:[0,1,0,0,0,0]},

            51:{name:'风火家人',yao:[0,1,0,1,1,0]}, 52:{name:'火泽睽',yao:[0,1,1,0,1,0]},
            53:{name:'山蹇',yao:[0,0,1,0,0,0]}, 54:{name:'雷水解',yao:[0,1,0,0,1,0]},
            55:{name:'雷泽归妹',yao:[0,1,1,0,0,0]}, 56:{name:'风火家人',yao:[0,1,0,1,1,0]},
            57:{name:'火山旅',yao:[0,1,1,0,1,0]}, 58:{name:'巽为风',yao:[0,1,0,1,1,0]},
            59:{name:'兑为泽',yao:[0,1,1,0,1,0]}, 60:{name:'水泽节',yao:[0,1,0,0,1,0]},

            63:{name:'水火既济',yao:[0,1,0,1,0,0]}, 64:{name:'火水未济',yao:[0,1,0,1,0,0]}
        };

        const QIYUN_LEVELS = [
            { min:80, name:'大吉', color:'daji', desc:'今日气运旺盛，诸事顺遂', advice:'可适度增加投注，但仍需保持理性' },
            { min:60, name:'吉', color:'ji', desc:'今日气运平顺，小有收获', advice:'气运不错，可以正常投注' },
            { min:40, name:'平', color:'ping', desc:'今日气运一般，宜谨慎', advice:'请谨慎投注，量力而行' },

            { min:0, name:'大凶', color:'daxiong', desc:'今日气运低迷，诸事不宜', advice:'建议今日不购彩' }
        ];

        // ============================================
        // 数据存储层
        // ============================================
        const Store = {
            data: {
                qiguaCount: 0,
                ssq: { period: '', records: [], result: null, history: [] },
                dlt: { period: '', records: [], result: null, history: [] }
            },
            saveTimer: null,
            dirty: false,

            async load() {
                try {
                    const res = await fetch(CONFIG.FIREBASE_URL);
                    const d = await res.json();
                    if (d) {
                        this.data.qiguaCount = d.qigua_count || 0;
                        if (d.ssq) this.data.ssq = { period:'', records:[], result:null, history:[], ...d.ssq };
                        if (d.dlt) this.data.dlt = { period:'', records:[], result:null, history:[], ...d.dlt };
                    }
                } catch (e) {
                    console.error('加载数据失败:', e);
                }
            },

            scheduleSave() {
                this.dirty = true;
                if (this.saveTimer) clearTimeout(this.saveTimer);
                this.saveTimer = setTimeout(() => this.save(), CONFIG.SAVE_DELAY);
            },

            async save() {
                if (!this.dirty) return;
                try {
                    const res = await fetch(CONFIG.FIREBASE_URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            qigua_count: this.data.qiguaCount,
                            ssq: this.data.ssq,
                            dlt: this.data.dlt
                        })
                    });
                    if (res.ok) this.dirty = false;
                } catch (e) {
                    console.error('保存数据失败:', e);
                }
            },

            addRecord(type, record) {
                this.data[type].records.push(record);
                this.scheduleSave();
            },

            incCount() {
                this.data.qiguaCount++;
                this.scheduleSave();
                return this.data.qiguaCount;
            }
        };

        // ============================================
        // API 层
        // ============================================
        const Api = {
            async getPeriod(type) {
                try {
                    const res = await fetch(`${CONFIG.LOTTERY_API}?type=${type}&page=1&limit=1`);
                    const d = await res.json();
                    return d.code === 1 && d.data.last ? d.data.last.code : null;
                } catch (e) {
                    return type === 'ssq' ? '2026058' : '26056';
                }
            },

            async getResult(type) {
                try {
                    const res = await fetch(`${CONFIG.LOTTERY_API}?type=${type}&page=1&limit=1`);
                    const d = await res.json();
                    if (d.code === 1 && d.data.last) {
                        const last = d.data.last;
                        return {
                            period: last.code,
                            date: last.day,
                            red: [last.one, last.two, last.three, last.four, last.five, last.six].map(Number),
                            blue: type === 'ssq' ? [Number(last.seven)] : [Number(last.six), Number(last.seven)]
                        };
                    }
                } catch (e) {}
                return null;
            }
        };

        // ============================================
        // 核心业务逻辑
        // ============================================
        const Core = {
            guiCang(n, max) {
                const r = Math.round(n) % max;
                return r === 0 ? max : r;
            },

            getRelation(ti, yong) {
                const tw = WUXING[ti], yw = WUXING[yong];
                if (SHENG[tw] === yw) return { type: '体生用', desc: `体${tw}生用${yw}` };
                if (KE[tw] === yw) return { type: '体克用', desc: `体${tw}克用${yw}` };
                if (SHENG[yw] === tw) return { type: '用生体', desc: `体${tw}被用${yw}生` };
                if (KE[yw] === tw) return { type: '用克体', desc: `体${tw}被用${yw}克` };
                return { type: '比和', desc: `体${tw}比用${yw}` };
            },

            calcGua() {
                const now = new Date();
                const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
                const h = now.getHours(), min = now.getMinutes(), s = now.getSeconds();

                const sum1 = y + m + d;
                const sum2 = y + m + d + h + min + s;
                const shang = this.guiCang(sum1, 8);
                const xia = this.guiCang(sum2, 8);
                const dong = this.guiCang(sum2, 6);
                const dz = this.guiCang(h * 3600 + min * 60 + s, 12);

                const benXu = (shang - 1) * 8 + xia;
                const benGua = GUA_64[benXu] || GUA_64[1];

                let ti, yong;
                if (dong <= 3) { ti = shang; yong = xia; }
                else { ti = xia; yong = shang; }

                const rel = this.getRelation(ti, yong);

                const yao = [...benGua.yao];
                yao[dong - 1] = yao[dong - 1] === 1 ? 0 : 1;
                const bShang = yao.slice(0, 3), bXia = yao.slice(3, 6);
                const bShangNum = TRI_TO_NUM[bShang.join('')] || 1;
                const bXiaNum = TRI_TO_NUM[bXia.join('')] || 1;
                const bianXu = (bShangNum - 1) * 8 + bXiaNum;
                const bianGua = GUA_64[bianXu] || GUA_64[1];

                const hShang = TRI_TO_NUM[benGua.yao.slice(2, 5).join('')] || 1;
                const hXia = TRI_TO_NUM[benGua.yao.slice(1, 4).join('')] || 1;
                const huXu = (hShang - 1) * 8 + hXia;
                const huGua = GUA_64[huXu] || GUA_64[1];

                return { y, m, d, h, min, s, shang, xia, dong, dz, benXu, benGua, ti, yong, rel, bianXu, bianGua, hShang, hXia, huXu, huGua };
            },

            genLottery(g) {
                const coeff = { '体生用':0.7, '体克用':1.3, '用生体':1.1, '用克体':0.9, '比和':1.0 };
                const c = coeff[g.rel.type] || 1.0;

                const calc = (base, max) => {
                    let r;
                    if (g.rel.type === '比和') r = Math.round((g.ti * g.yong + base) * c);
                    else if (g.rel.type === '体生用' || g.rel.type === '用生体') r = Math.round((g.ti + g.yong + base) * c);
                    else r = Math.round((Math.abs(g.ti - g.yong) + base) * c);
                    return this.guiCang(r, max);
                };

                const adjust = (arr, max) => {
                    const result = [];
                    for (let v of arr) {
                        let attempts = 0;
                        while (result.includes(v) && attempts < max) {
                            const step = Math.floor(Math.random() * 11) + 5;
                            v += Math.random() > 0.5 ? step : -step;
                            while (v > max) v -= max;
                            while (v < 1) v += max;
                            attempts++;
                        }
                        result.push(v);
                    }
                    for (let i = 1; i < result.length; i++) {
                        if (Math.abs(result[i] - result[i-1]) <= 2) {
                            for (let j = 0; j < result.length; j++) {
                                if (j !== i && Math.abs(result[j] - result[i-1]) > 3 && Math.abs(result[j] - result[i]) > 3) {
                                    [result[i], result[j]] = [result[j], result[i]];
                                    break;
                                }
                            }
                        }
                    }
                    return result.sort((a, b) => a - b);
                };

                const redCand = [
                    this.guiCang(g.benXu, 33),
                    this.guiCang(g.bianXu, 33),
                    calc(g.dong, 33),
                    this.guiCang(g.hShang * g.hXia, 33),
                    this.guiCang(g.shang * 10 + g.xia, 33),
                    this.guiCang(g.bianXu * c, 33)
                ];
                const red = adjust(redCand, 33).slice(0, 6);
                const blue = calc(g.dong + g.dz, 16);

                const frontCand = [
                    this.guiCang(g.benXu, 35),
                    this.guiCang(g.bianXu, 35),
                    calc(g.dong, 35),
                    this.guiCang(g.hShang * g.hXia + g.dz, 35),
                    this.guiCang(g.dong * g.dz * c, 35)
                ];
                const front = adjust(frontCand, 35).slice(0, 5);

                let backA = this.guiCang(g.hShang + g.dong, 12);
                let backB = this.guiCang(g.hXia + g.dz, 12);
                if (backA === backB) { backB++; if (backB > 12) backB = 1; }

                return { red, blue, front, back: [backA, backB].sort((a,b) => a-b) };
            },

            calcQiYun(g) {
                let score = 50;
                const r = g.rel.type;
                if (r === '用生体') score += 30;
                else if (r === '体克用') score += 15;
                else if (r === '比和') score += 10;
                else if (r === '体生用') score -= 15;
                else if (r === '用克体') score -= 30;

                const month = new Date().getMonth() + 1;
                const season = month >= 3 && month <= 5 ? '木' : month >= 6 && month <= 8 ? '火' : month >= 9 && month <= 11 ? '金' : '水';
                if (WUXING[g.ti] === season) score += 10;

                return Math.max(0, Math.min(100, score));
            },

            matchSSQ(rec, res) {
                if (!res) return null;
                const red = rec.red || rec.redBalls || [];
                const blue = rec.blue || rec.blueBalls || [];
                const resRed = res.red || res.redBalls || [];
                const resBlue = res.blue || res.blueBalls || [];
                const mRed = red.filter(r => resRed.includes(r)).length;
                const mBlue = blue[0] === resBlue[0] ? 1 : 0;
                let prize = null;
                if (mRed === 6 && mBlue === 1) prize = { level:1, name:'一等奖' };
                else if (mRed === 6) prize = { level:2, name:'二等奖' };
                else if (mRed === 5 && mBlue === 1) prize = { level:3, name:'三等奖' };
                else if (mRed === 5 || (mRed === 4 && mBlue === 1)) prize = { level:4, name:'四等奖' };
                else if (mRed === 4 || (mRed === 3 && mBlue === 1)) prize = { level:5, name:'五等奖' };
                else if (mBlue === 1) prize = { level:6, name:'六等奖' };
                return { mRed, mBlue, prize };
            },

            matchDLT(rec, res) {
                if (!res) return null;
                const red = rec.red || rec.redBalls || [];
                const blue = rec.blue || rec.blueBalls || [];
                const resRed = res.red || res.redBalls || [];
                const resBlue = res.blue || res.blueBalls || [];
                const mRed = red.filter(r => resRed.includes(r)).length;
                const mBlue = blue.filter(b => resBlue.includes(b)).length;
                let prize = null;
                if (mRed === 5 && mBlue === 2) prize = { level:1, name:'一等奖' };
                else if (mRed === 5 && mBlue === 1) prize = { level:2, name:'二等奖' };
                else if (mRed === 5 || (mRed === 4 && mBlue === 2)) prize = { level:3, name:'三等奖' };
                else if ((mRed === 4 && mBlue === 1) || (mRed === 3 && mBlue === 2)) prize = { level:4, name:'四等奖' };
                else if (mRed === 4 || (mRed === 3 && mBlue === 1)) prize = { level:5, name:'五等奖' };
                else if ((mRed === 2 && mBlue === 2) || mRed === 3) prize = { level:6, name:'六等奖' };
                else if ((mRed === 1 && mBlue === 2) || (mRed === 2 && mBlue === 1)) prize = { level:7, name:'七等奖' };
                else if (mBlue === 2 || (mRed === 1 && mBlue === 1) || mRed === 2) prize = { level:8, name:'八等奖' };
                return { mRed, mBlue, prize };
            },

            async checkPeriod(type) {
                const period = await Api.getPeriod(type);
                const data = Store.data[type];

                if (!data.period) {
                    data.period = period;
                    Store.scheduleSave();
                    return;
                }

                if (data.period !== period && data.records.length > 0) {
                    const result = await Api.getResult(type);
                    const matched = data.records.map(r => ({
                        ...r,
                        match: type === 'ssq' ? this.matchSSQ(r, result) : this.matchDLT(r, result)
                    }));
                    data.history.unshift({ period: data.period, records: matched, result });
                    if (data.history.length > CONFIG.MAX_HISTORY) data.history.pop();
                    data.period = period;
                    data.records = [];
                    data.result = null;
                    Store.scheduleSave();
                }
            }
        };

        // ============================================
        // UI 层
        // ============================================
        const UI = {
            $(id) { return document.getElementById(id); },

            balls(arr, type, small = false, matched = null) {
                if (!arr || !Array.isArray(arr)) return '';
                const cls = small ? `ball ball-${type} ball-small` : `ball ball-${type}`;
                return arr.map(n => {
                    const isMatch = matched && matched.includes(n);
                    return `<div class="${cls}${isMatch ? ' matched' : ''}">${n}</div>`;
                }).join('');
            },

            renderResult(type, g, l) {
                if (type === 'ssq') {
                    this.$('ssq-red').innerHTML = this.balls(l.red, 'red');
                    this.$('ssq-blue').innerHTML = this.balls([l.blue], 'blue');
                    this.$('ssq-info').innerHTML = `
                        <p><strong>本卦：</strong>${g.benGua.name}（第${g.benXu}卦）</p>
                        <p><strong>变卦：</strong>${g.bianGua.name}（第${g.bianXu}卦）</p>
                        <p><strong>动爻：</strong>第${g.dong}爻</p>
                        <p><strong>体用：</strong>${g.rel.desc}</p>
                    `;
                } else {
                    this.$('dlt-front').innerHTML = this.balls(l.front, 'red');
                    this.$('dlt-back').innerHTML = this.balls(l.back, 'blue');
                    this.$('dlt-info').innerHTML = `
                        <p><strong>本卦：</strong>${g.benGua.name}（第${g.benXu}卦）</p>
                        <p><strong>变卦：</strong>${g.bianGua.name}（第${g.bianXu}卦）</p>
                        <p><strong>动爻：</strong>第${g.dong}爻</p>
                        <p><strong>体用：</strong>${g.rel.desc}</p>
                    `;
                }
            },

            renderRecords(type) {
                const data = Store.data[type];
                const el = this.$(`${type}-records`);
                const records = data.records;

                if (records.length === 0) {
                    el.innerHTML = '<p class="text-center py-4" style="color:var(--text-secondary)">暂无预测记录</p>';
                    el.classList.remove('record-scroll');
                    return;
                }

                el.classList.toggle('record-scroll', records.length >= 3);

                const html = records.map((r, i) => {
                    const t = new Date(r.time || r.timestamp).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
                    const red = r.red || r.redBalls || [];
                    const blue = r.blue || r.blueBalls || [];
                    return `<div class="record-item">
                        <span class="text-xs" style="color:var(--text-secondary)">#${i+1}</span>
                        <div class="flex-1">${this.balls(red, 'red', true)} + ${this.balls(blue, 'blue', true)}</div>
                        <span class="text-xs" style="color:var(--text-secondary)">${t}</span>
                        <span class="prize-badge prize-none">待开奖</span>
                    </div>`;
                }).join('');

                el.innerHTML = records.length >= 3 ? html + html : html;
                this.renderHistory(type);
            },

            renderHistory(type) {
                const el = this.$(`${type}-history`);
                const history = Store.data[type].history;

                if (history.length === 0) {
                    el.innerHTML = '<p class="text-center py-4" style="color:var(--text-secondary)">暂无历史记录</p>';
                    return;
                }

                el.innerHTML = history.map(h => {
                    const resRed = h.result?.red || h.result?.redBalls || [];
                    const resBlue = h.result?.blue || h.result?.blueBalls || [];
                    const resultHtml = h.result ? `<p class="text-sm mb-2" style="color:var(--text-secondary)">开奖：${resRed.join(',')} + ${resBlue.join(',')} (${h.result.date})</p>` : '';
                    const recordsHtml = h.records.map((r, i) => {
                        const t = new Date(r.time || r.timestamp).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
                        const prize = r.match?.prize || r.matchResult?.prize;
                        const red = r.red || r.redBalls || [];
                        const blue = r.blue || r.blueBalls || [];
                        return `<div class="record-item">
                            <span class="text-xs" style="color:var(--text-secondary)">#${i+1}</span>
                            <div class="flex-1">${this.balls(red, 'red', true, resRed)} + ${this.balls(blue, 'blue', true, resBlue)}</div>
                            <span class="text-xs" style="color:var(--text-secondary)">${t}</span>
                            ${prize ? `<span class="prize-badge prize-${prize.level}">${prize.name}</span>` : '<span style="color:var(--text-secondary)">-</span>'}
                        </div>`;
                    }).join('');
                    return `<div class="mb-4 pb-4" style="border-bottom:1px solid rgba(212,175,55,0.1)">
                        <div class="flex justify-between mb-2">
                            <span class="font-bold" style="color:var(--accent-gold)">第 ${h.period} 期</span>
                            <span class="text-sm" style="color:var(--text-secondary)">${h.result ? '已开奖' : '未开奖'}</span>
                        </div>
                        ${resultHtml}
                        <div class="space-y-1">${recordsHtml}</div>
                    </div>`;
                }).join('');
            },

            renderLotteryResult(type) {
                const data = Store.data[type];
                const el = this.$(`${type}-result`);
                if (data.result) {
                    const red = data.result.red || data.result.redBalls || [];
                    const blue = data.result.blue || data.result.blueBalls || [];
                    el.innerHTML = `<strong>开奖：</strong>${this.balls(red, 'red', true)} + ${this.balls(blue, 'blue', true)} <span style="color:var(--text-secondary)">(${data.result.date})</span>`;
                } else {
                    el.innerHTML = '开奖结果：待更新';
                }
            },

            renderQiYun(score) {
                const level = QIYUN_LEVELS.find(l => score >= l.min) || QIYUN_LEVELS[4];
                this.$('qiyun-display').innerHTML = `
                    <div class="qiyun-card qiyun-${level.color}">
                        <div class="text-2xl font-bold">${level.name}</div>
                        <div class="text-xl font-bold mt-1">${score}分</div>
                        <p class="mt-2">${level.desc}</p>
                        <p class="text-sm mt-1" style="opacity:0.8">${level.advice}</p>
                    </div>`;
            },

            setTime(g) {
                this.$('time-display').textContent = `${g.y}年${g.m}月${g.d}日 ${g.h}时${g.min}分${g.s}秒`;
            },

            setPeriod(type, period) {
                this.$(`${type}-period`).textContent = `期号：${period}`;
            },

            setCount(n) {
                this.$('qigua-count').textContent = n;
            },

            setLoading(id, loading) {
                const btn = this.$(id);
                if (loading) { btn.disabled = true; btn.classList.add('loading'); }
                else { btn.disabled = false; btn.classList.remove('loading'); }
            },

            toggleDetail(type) {
                const el = this.$(`${type}-detail`);
                const btn = el.previousElementSibling;
                if (el.classList.contains('hidden')) {
                    el.classList.remove('hidden');
                    btn.textContent = '[ 收起详细推导 ]';
                } else {
                    el.classList.add('hidden');
                    btn.textContent = '[ 查看详细推导 ]';
                }
            },

            toast(msg, type = 'info') {
                const el = this.$('toast');
                el.textContent = msg;
                el.className = `toast ${type} show`;
                setTimeout(() => el.classList.remove('show'), 3000);
            }
        };

        // ============================================
        // 应用入口
        // ============================================
        const App = {
            async init() {
                // 加载不蒜子统计
                if (location.protocol !== 'file:') {
                    const script = document.createElement('script');
                    script.src = 'https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js';
                    script.async = true;
                    document.head.appendChild(script);
                } else {
                    UI.$('pv').textContent = '--';
                    UI.$('uv').textContent = '--';
                }

                // 加载数据
                await Store.load();
                UI.setCount(Store.data.qiguaCount);

                // 检查周期
                await Core.checkPeriod('ssq');
                await Core.checkPeriod('dlt');

                UI.setPeriod('ssq', Store.data.ssq.period || '--');
                UI.setPeriod('dlt', Store.data.dlt.period || '--');
                UI.renderRecords('ssq');
                UI.renderRecords('dlt');

                // 获取开奖结果
                await this.refreshData('ssq');
                await this.refreshData('dlt');

                // 定时刷新
                setInterval(() => {
                    this.refreshData('ssq');
                    this.refreshData('dlt');
                }, 30 * 60 * 1000);
            },

            async refreshData(type) {
                const result = await Api.getResult(type);
                const period = await Api.getPeriod(type);
                UI.setPeriod(type, period);
                if (result) {
                    Store.data[type].result = result;
                    Store.scheduleSave();
                    UI.renderLotteryResult(type);
                    UI.renderRecords(type);
                }
            },

            async doQiGua(type) {
                const btnId = type === 'ssq' ? 'btn-ssq' : 'btn-dlt';
                UI.setLoading(btnId, true);

                try {
                    const count = Store.incCount();
                    UI.setCount(count);

                    const g = Core.calcGua();
                    const l = Core.genLottery(g);

                    UI.setTime(g);
                    UI.$('result-section').classList.remove('hidden');
                    UI.renderResult(type, g, l);

                    const record = {
                        id: `p_${Date.now()}`,
                        time: Date.now(),
                        red: type === 'ssq' ? l.red : l.front,
                        blue: type === 'ssq' ? [l.blue] : l.back
                    };

                    Store.addRecord(type, record);
                    UI.renderRecords(type);
                } finally {
                    UI.setLoading(btnId, false);
                }
            },

            doQiYun() {
                const key = `qiyun_${new Date().toISOString().slice(0,10)}`;
                const cached = localStorage.getItem(key);
                if (cached) {
                    UI.renderQiYun(JSON.parse(cached));
                    return;
                }

                const g = Core.calcGua();
                const score = Core.calcQiYun(g);
                localStorage.setItem(key, JSON.stringify(score));
                UI.renderQiYun(score);
            }
        };

        // 绑定事件
        document.getElementById('btn-ssq').addEventListener('click', () => App.doQiGua('ssq'));
        document.getElementById('btn-dlt').addEventListener('click', () => App.doQiGua('dlt'));
        document.getElementById('btn-qiyun').addEventListener('click', () => App.doQiYun());

        // 启动
        document.addEventListener('DOMContentLoaded', () => App.init());

        // 暴露给全局
        window.App = App;
        window.UI = UI;

    })();
    </script>
